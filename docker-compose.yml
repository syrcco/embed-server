version: "3.9"

services:
  embed-server:
    build: .
    ports:
      - "8765:8765"
    volumes:
      # Model directory mounted read-only; override with MODELS_DIR env var
      - ${MODELS_DIR:-/home/aichan/models}:/models:ro
    environment:
      - MODEL_PATH=/models/Qwen3-Embedding-0.6B
    restart: always
    mem_limit: 4g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
